description: 以用户提供的调研提纲为骨架，先建立可追溯材料台账，再跨部门归并形成综合调研 Word 初稿。
enabled: true
triggers:
  - 综合调研
  - 综合调研材料
  - 调研材料整合
  - 调研材料汇总
  - 调研材料做个汇总
  - 按提纲整合
  - 按提纲汇总
  - 按调研提纲整合
  - 按调研提纲汇总
allowed_tools:
  - document_reader
  - word_reader
  - pdf_reader
  - llm_writer
workflow: skills.research_synthesis.workflow:run
supports_revision: false
inputs:
  - text
  - files
outputs:
  - title
  - body
  - sources
  - output_file
