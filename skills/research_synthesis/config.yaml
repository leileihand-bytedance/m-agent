id: research_synthesis
name: 综合调研整合
description: 以用户提供的调研提纲为固定骨架，将多部门材料归入对应章节并形成综合调研初稿。
enabled: true
triggers:
  - 综合调研
  - 综合调研材料
  - 调研材料整合
  - 按提纲整合
  - 按提纲汇总
  - 按调研提纲整合
  - 按调研提纲汇总
allowed_tools:
  - document_reader
  - word_reader
  - pdf_reader
  - llm_writer
workflow: skills.research_synthesis.workflow:run
supports_revision: false
inputs:
  - text
  - files
outputs:
  - title
  - body
  - sources
