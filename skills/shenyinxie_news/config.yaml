id: shenyinxie_news
name: 深银协动态
enabled: true
description: 严格按用户指定月份及上半月/下半月，通过 DeepSeek 分阶段检索权威媒体；未明确时先追问且不搜索。用结构化模型判断微众银行正面新闻与成果，优先采用专题全文，必要时对综合报道做原文摘编，并直接复制用户确认案例的净化模板生成带可点击原文链接的 Word 文档。
triggers:
  - 深银协动态
  - 生成深银协动态
  - 整理深银协动态
  - 深圳银行业协会动态
allowed_tools:
  - search
  - web_reader
  - llm_writer
workflow: skills.shenyinxie_news.workflow:run
supports_revision: false
inputs:
  - text
outputs:
  - title
  - body
  - sources
  - output_file
  - period_start
  - period_end
  - needs_clarification
  - message
