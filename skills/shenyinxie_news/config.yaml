id: shenyinxie_news
name: 深银协动态
enabled: true
description: 根据指定半月时间范围，通过 DeepSeek 分阶段检索权威媒体，用结构化模型判断微众银行正面新闻与成果；优先采用专题全文，必要时对综合报道做原文摘编，生成带原文链接和摘编说明的 Word 文档。
triggers:
  - 深银协动态
  - 生成深银协动态
  - 整理深银协动态
  - 深圳银行业协会动态
allowed_tools:
  - search
  - web_reader
  - llm_writer
workflow: skills.shenyinxie_news.workflow:run
supports_revision: false
inputs:
  - text
outputs:
  - title
  - body
  - sources
  - output_file
  - period_start
  - period_end
  - needs_clarification
  - message
