# 市场观察的非固定内容按主题分组检索，防止单一宽泛查询只命中一类行情。
# query_templates 由运行时只替换 {date_range}，网页仍须通过本板块域名、日期和正文校验。
market_observation_topics:
  - id: domestic_macro
    name: 国内宏观与经济运行
    query_templates:
      - "国家统计局 海关总署 国家发展改革委 GDP CPI PPI PMI 工业增加值 社会消费品零售 固定资产投资 进出口 房地产 经济数据 {date_range}"
  - id: domestic_rates_fx
    name: 国内货币信用利率汇率
    query_templates:
      - "中国人民银行 中国货币网 中国债券信息网 LPR 逆回购 MLF 社融 信贷 Shibor 资金面 国债收益率 债券收益率 信用利差 人民币汇率 {date_range}"
  - id: wealth_asset_management
    name: 财富管理与资产管理
    query_templates:
      - "中国理财网 中国证券投资基金业协会 银行理财 固收+ 净值波动 业绩比较基准 公募基金 同业存单 资管市场结构 {date_range}"
  - id: global_macro_central_banks
    name: 全球宏观与主要央行
    query_templates:
      - "美联储 欧洲央行 日本银行 英格兰银行 IMF GDP CPI PCE 非农 就业 利率决议 会议纪要 通胀预期 经济增长 {date_range}"
  - id: global_market_stress
    name: 全球市场波动与金融稳定
    query_templates:
      - "新华财经 美联社 路透社 全球债市 股市 汇市 主权债收益率 美元 日元 熔断 流动性 风险溢价 金融稳定 {date_range}"
  - id: geopolitics_trade_energy
    name: 地缘贸易能源与供应链
    query_templates:
      - "新华社 美联社 路透社 IMF IEA EIA OPEC 地缘冲突 制裁 关税 贸易摩擦 航运 供应链 原油 黄金 大宗商品 通胀影响 {date_range}"
  - id: major_capital_events
    name: 重大资本市场事件
    query_templates:
      - "证券交易所 美国证券交易委员会 新华财经 美联社 路透社 创纪录 IPO 重大违约 并购 重组 救助 退市 交易中断 市场影响 {date_range}"

# 同业动向按机构类型分组，再在每组内分别搜索经营/战略和产品/科技/风险主题。
# 每个查询模板只替换 {entity_names} 与 {date_range}；未登记机构和域名不能进入候选池。
peer_activity_topics:
  - id: domestic_digital_banks
    name: 境内民营与数字银行
    category: domestic_digital_banks
    chunk_size: 5
    query_templates:
      - "{entity_names} 官网 年报 经营业绩 客户 存款 贷款 盈利 资本 战略 {date_range}"
      - "{entity_names} 产品 小微金融 数字化 科技 人工智能 风险管理 合作 组织治理 {date_range}"
  - id: international_digital_banks
    name: 国际及香港数字银行
    category: international_digital_banks
    chunk_size: 5
    query_templates:
      - "{entity_names} official news annual report earnings customers deposits lending licence license 牌照 expansion partnership {date_range}"
      - "{entity_names} product technology AI fraud risk management compliance acquisition leadership capital {date_range}"
  - id: bank_technology_subsidiaries
    name: 国内银行科技子公司
    category: bank_technology_subsidiaries
    chunk_size: 5
    query_templates:
      - "{entity_names} 官网 经营 战略 客户 合作 项目落地 组织治理 {date_range}"
      - "{entity_names} 产品 科技 人工智能 大模型 数据 云 核心系统 风险管理 反欺诈 {date_range}"

