id: internal_weekly
name: 内参周报
enabled: true
description: 独立生成供微众银行内部管理团队和部门参考的内参周报内容核对稿，党政要闻覆盖与经营管理相关的宏观发展、科技创新和人工智能、促消费、小微企业等中央重大信息，同一大会或论坛合并互补成果；监管动态以实际监管机构为主体；同业动向按境内民营/数字银行、国际及香港数字银行、国内银行科技子公司分组，从机构官网、投资者关系、监管披露和权威媒体筛选经营、产品、科技风控、战略及治理变化。按固定五类板块筛选上一自然周信息；市场观察首项固定为上周A股、周一A股收盘、上周港股和上周美股综述，其后按七类主题筛选影响增长、通胀、利率、汇率、流动性、风险偏好或银行资产负债环境的国内外大事，15:00收盘前先生成上周综述并用红色粗体标注待更新，收盘后可单独生成今日资本市场更新块；前沿观点基于可逐字核验的研究报告原文生成中文压缩摘要并标明出处。初次输出 Markdown 核对稿与 JSON 溯源清单；人工明确确认当前版本无误后，可基于 Skill 内净化母版生成洁净版 Word。
triggers:
  - 内参周报
  - 生成内参周报
  - 整理内参周报
  - 内参周报内容稿
  - 今天的资本市场综述
  - 今日资本市场综述
  - 更新今日资本市场综述
allowed_tools:
  - search
  - web_reader
  - llm_writer
workflow: skills.internal_weekly.workflow:run
supports_revision: true
inputs:
  - text
outputs:
  - generation_mode
  - title
  - body
  - sources
  - publication_date
  - period_start
  - period_end
  - sections
  - source_records
  - ready_for_approval
  - draft_version
  - document_metadata
  - output_file
  - manifest_file
  - needs_clarification
  - message
